<label class="toggle-container" [class.disabled-opacity]="disabled()">
  <input 
    type="checkbox" 
    [checked]="checked()" 
    [disabled]="disabled()"
    (change)="onToggle()" 
    class="toggle-input" 
  />
  <span class="toggle-slider"></span>
  @if (label()) {
    <span class="toggle-label">{{ label() }}</span>
  }
</label>
